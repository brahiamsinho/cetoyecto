# Production stack. All application ports are bound to 127.0.0.1 so the
# host-level nginx is the only public entry point.
# Run from the repository root with:
#   docker compose --env-file .env -f docker/docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:15
    container_name: cup_ficct_db
    # PostgreSQL is intentionally not exposed on any host interface.
    # It is reachable only inside the Docker network by the backend service.
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      POSTGRES_DB: ${DB_DATABASE:-cup_ficct}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: cup_ficct_pgadmin
    ports:
      - "127.0.0.1:5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      SCRIPT_NAME: /pgadmin
    depends_on:
      - postgres
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: cup_ficct_mail
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    environment:
      MP_UI_WEB_ROOT: /mailpit
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: docker-backend-fast
    container_name: cup_ficct_backend
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ../backend:/var/www/html
      - ../.env:/var/www/html/.env:ro
    depends_on:
      - postgres
      - mailpit
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cup_ficct_frontend
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      VITE_API_TARGET: ${VITE_API_TARGET:-http://backend:8000}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
