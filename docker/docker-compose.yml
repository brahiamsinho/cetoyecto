services:
  postgres:
    image: postgres:15
    container_name: cup_ficct_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: cup_ficct
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: cup_ficct_pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - postgres
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: cup_ficct_mail
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  backend:
    image: docker-backend-fast
    container_name: cup_ficct_backend
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/var/www/html
    depends_on:
      - postgres
      - mailpit
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: cup_ficct
      DB_USERNAME: postgres
      DB_PASSWORD: secret
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      MAIL_ENCRYPTION: "null"
      MAIL_FROM_ADDRESS: noreply@ficct.edu.bo
      MAIL_FROM_NAME: "CUP FICCT"
      APP_FRONTEND_URL: "http://localhost:5173"
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cup_ficct_frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      VITE_API_TARGET: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
